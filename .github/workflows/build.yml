name: Build DeskFlow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build DMG
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: DeskFlow-macOS
          path: dist/*.dmg

  build-win:
    name: Windows (EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build EXE
        run: npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: DeskFlow-Windows
          path: dist/*.exe
